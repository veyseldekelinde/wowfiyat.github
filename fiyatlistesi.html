    <style>
        * { box-sizing: border-box; }
        
        :root { 
            --primary-color: #ffc107; 
            --bg-color: #1a1a1a; 
            --card-bg: #2d2d2d; 
            --text-color: #ffffff;
        }
        
        body { 
            background: var(--bg-color); 
            min-height: 100vh; 
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .navbar { 
            background: linear-gradient(90deg, #ff6b00, #ff8c00) !important;
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3);
        }
        
        .navbar-brand {
            font-size: 1.4rem !important;
            letter-spacing: 1px;
        }
        
        .logo-text {
            background: linear-gradient(45deg, #ffc107, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800 !important;
        }
        
        .lang-select {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            min-width: 140px;
        }
        
        .lang-select:focus {
            outline: none;
            border-color: #ffc107;
        }
        
        .lang-select option {
            background: #2d2d2d;
            color: white;
        }
        
        .card-img-top { 
            height: 160px; 
            object-fit: cover; 
            border-top-left-radius: 15px; 
            border-top-right-radius: 15px; 
        }
        
        .card { 
            border-radius: 15px; 
            background: var(--card-bg); 
            color: var(--text-color); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(255, 107, 0, 0.2);
            transition: all 0.3s ease;
        }
        
        .price-tag { 
            color: var(--primary-color); 
            font-weight: 800; 
            font-size: 1.4rem;
            text-shadow: 0 0 20px rgba(255, 193, 7, 0.3);
        }
        
        .product-name {
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
        }
        
        body.dark { 
            --bg-color: #0a0a0a; 
            --card-bg: #1a1a1a; 
            --text-color: #ffffff; 
        }
        
        body.light { 
            --bg-color: #f8f9fa; 
            --card-bg: #ffffff; 
            --text-color: #212529; 
        }
        
        body.warm { 
            --bg-color: #1a0f0a; 
            --card-bg: #2a1810; 
            --text-color: #ffe4c4; 
            --primary-color: #ff8c00; 
        }
        
        .theme-btn { 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            border: 2px solid rgba(255,255,255,0.2); 
            cursor: pointer; 
            margin: 3px; 
            opacity: 0.7;
            transition: all 0.3s;
        }
        
        .theme-btn:hover { 
            opacity: 1; 
            transform: scale(1.1);
            border-color: #ffc107;
        }
        
        .theme-controls { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            z-index: 1000; 
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 10px 15px; 
            border-radius: 25px; 
            display: flex;
            gap: 5px;
        }
        
        .loading { 
            text-align: center; 
            padding: 80px 20px; 
        }
        
        .spinner-border {
            width: 3rem;
            height: 3rem;
            border-width: 4px;
        }
        
        .header-section {
            padding: 20px 0;
            text-align: center;
        }
        
        .header-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 5px;
        }
        
        .header-subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }
        
        @media (max-width: 576px) {
            .card-img-top {
                height: 120px;
            }
            
            .price-tag {
                font-size: 1.2rem;
            }
            
            .product-name {
                font-size: 0.9rem;
            }
            
            .header-title {
                font-size: 1.5rem;
            }
            
            .theme-controls {
                bottom: 10px;
                right: 10px;
                padding: 8px 12px;
            }
            
            .theme-btn {
                width: 30px;
                height: 30px;
            }
            
            .lang-select {
                min-width: 110px;
                font-size: 0.75rem;
                padding: 6px 8px;
            }
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
    </style>
</head>

            { id: 6, name: "Patates (Orta)", price: 59, image: "https://via.placeholder.com/400x300?text=Patates" },
            { id: 7, name: "Cola", price: 35, image: "https://via.placeholder.com/400x300?text=Cola" },
            { id: 8, name: "Milkshake", price: 69, image: "https://via.placeholder.com/400x300?text=Milkshake" }
        ];

        let currentLang = localStorage.getItem('wowburger_lang') || 'tr';

        function formatPrice(priceInTL) {
            const config = currencyConfig[currentLang];
            const converted = priceInTL * config.rate;
            
            // Ondalık basamak kontrolü
            let decimals = 0;
            if (converted < 1) decimals = 2;
            else if (converted < 10) decimals = 1;
            
            return converted.toLocaleString(config.locale, { 
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals 
            }) + ' ' + config.symbol;
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('wowburger_lang', lang);
            document.getElementById('langSelect').value = lang;
            
            const t = translations[lang];
            document.getElementById('pageTitle').textContent = t.title;
            document.getElementById('pageSubtitle').textContent = t.subtitle;
            document.getElementById('loadingText').textContent = t.loading;
            document.getElementById('errorText').textContent = t.error;
            
            loadProducts();
        }

        async function loadProducts() {
            try {
                const res = await fetch(`${API_URL}/api/products`);
                const products = await res.json();
                
                if (products && products.length > 0) {
                    document.getElementById('loading').style.display = 'none';
                    renderProducts(products);
                } else {
                    renderProducts(defaultProducts);
                }
            } catch (e) {
                console.log('Server bağlantısı yok, local ürünler kullanılıyor');
                document.getElementById('loading').style.display = 'none';
                renderProducts(defaultProducts);
            }
        }

        function renderProducts(products) {
            document.getElementById('productList').innerHTML = products.map(p => `
                <div class="card h-100">
                    <img src="${p.image || 'https://via.placeholder.com/400x300?text=No+Image'}" 
                         class="card-img-top" 
                         alt="${p.name}"
                         onerror="this.src='https://via.placeholder.com/400x300?text=No+Image'">
                    <div class="card-body text-center d-flex flex-column justify-content-between">
                        <h6 class="product-name mb-2">${p.name}</h6>
                        <p class="price-tag mb-0">
                            ${formatPrice(p.price)}
                        </p>
                    </div>
                </div>
            `).join('');
        }

        function setTheme(theme) {
            document.body.className = theme;
            localStorage.setItem('wowburger_theme', theme);
        }

        // Kaydedilmiş ayarları yükle
        const savedTheme = localStorage.getItem('wowburger_theme') || 'dark';
        setTheme(savedTheme);
        
        document.getElementById('langSelect').value = currentLang;
        changeLanguage(currentLang);
    </script>
</body>
</html>
